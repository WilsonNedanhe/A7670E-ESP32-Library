; A7670E-ESP32-Library
; src/main.cpp is a demo entry point that exercises the library end-to-end.
; The library itself lives in lib/A7670E and is picked up automatically by
; PlatformIO's library dependency finder (lib_ldf_mode = deep+ below).
; Real usage examples for each module live in examples/.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=3

lib_ldf_mode = deep+

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    greiman/SdFat @ ^2.2.0

monitor_filters =
    esp32_exception_decoder

